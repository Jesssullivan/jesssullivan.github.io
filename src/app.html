<!doctype html>
<html lang="en" data-theme="pine" data-mode="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="application-name" content="transscendsurvival.org" />
		<meta name="apple-mobile-web-app-title" content="transscendsurvival.org" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="theme-color" content="#0f766e" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8fafc" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
		<meta name="msapplication-TileColor" content="#0f766e" />
		<meta name="msapplication-TileImage" content="%sveltekit.assets%/mstile-144x144.png" />
		<meta name="msapplication-config" content="%sveltekit.assets%/browserconfig.xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="icon" type="image/png" sizes="48x48" href="%sveltekit.assets%/favicon-48x48.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="mask-icon" href="%sveltekit.assets%/safari-pinned-tab.svg" color="#0f766e" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self'; script-src 'self' 'unsafe-inline' https://giscus.app; style-src 'self' 'unsafe-inline' https://giscus.app; img-src 'self' data: https:; font-src 'self'; frame-src 'self' https://w.soundcloud.com https://www.youtube-nocookie.com https://giscus.app; connect-src 'self' https://*.pagefind.app https://tinyland.dev https://hub.tinyland.dev; media-src 'self' https:"
		/>
		<meta name="referrer" content="strict-origin-when-cross-origin" />
		<link rel="alternate" type="application/feed+json" title="transscendsurvival.org JSON Feed" href="/feed.json" />
		<link rel="alternate" type="application/rss+xml" title="RSS" href="/feed.xml" />
		<script>
			(function () {
				var m = localStorage.getItem('color-mode');
				if (m !== 'dark' && m !== 'light')
					m = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
				document.documentElement.setAttribute('data-mode', m);
				document.documentElement.style.colorScheme = m;
				var t = localStorage.getItem('skeleton-theme');
				if (t) document.documentElement.setAttribute('data-theme', t);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
