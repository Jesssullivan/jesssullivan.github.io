<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Zig C ABI bridge from Apple application code to Linux native capabilities</title>
  <desc id="desc">A simple diagram showing SwiftUI and Objective-C application code calling a Zig C ABI boundary that maps to macOS and Linux native capability backends.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.52" stop-color="#182638"/>
      <stop offset="1" stop-color="#23331f"/>
    </linearGradient>
    <linearGradient id="zig" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7a41d"/>
      <stop offset="1" stop-color="#ffcf5a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="0" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#ffffff" stroke-width="1">
    <path d="M0 110H1200"/>
    <path d="M0 250H1200"/>
    <path d="M0 390H1200"/>
    <path d="M0 530H1200"/>
    <path d="M150 0V630"/>
    <path d="M350 0V630"/>
    <path d="M550 0V630"/>
    <path d="M750 0V630"/>
    <path d="M950 0V630"/>
  </g>

  <text x="80" y="92" fill="#f6f2e8" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="760">Small Zig FFI libraries</text>
  <text x="82" y="136" fill="#cbd8da" font-family="Inter, system-ui, sans-serif" font-size="24">keeping Apple-shaped app code from swallowing the portable native boundary</text>

  <g filter="url(#shadow)">
    <rect x="82" y="210" width="260" height="230" rx="24" fill="#f3f7ff" opacity="0.98"/>
    <text x="122" y="265" fill="#162033" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="760">SwiftUI / ObjC</text>
    <text x="122" y="307" fill="#526074" font-family="Inter, system-ui, sans-serif" font-size="19">application shell</text>
    <text x="122" y="350" fill="#526074" font-family="Inter, system-ui, sans-serif" font-size="19">views, windows, state</text>
    <text x="122" y="393" fill="#526074" font-family="Inter, system-ui, sans-serif" font-size="19">platform-facing call sites</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="185" width="260" height="280" rx="28" fill="url(#zig)"/>
    <text x="527" y="268" fill="#201708" font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="820">Zig</text>
    <text x="512" y="316" fill="#34240a" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">stable C ABI</text>
    <text x="513" y="356" fill="#533b12" font-family="Inter, system-ui, sans-serif" font-size="18">small native surfaces</text>
    <text x="513" y="388" fill="#533b12" font-family="Inter, system-ui, sans-serif" font-size="18">auditable contracts</text>
    <text x="513" y="420" fill="#533b12" font-family="Inter, system-ui, sans-serif" font-size="18">macOS + Linux paths</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="858" y="210" width="260" height="230" rx="24" fill="#eff8ef" opacity="0.98"/>
    <text x="902" y="265" fill="#172616" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="760">Linux native</text>
    <text x="902" y="307" fill="#4f6a4d" font-family="Inter, system-ui, sans-serif" font-size="19">libnotify</text>
    <text x="902" y="350" fill="#4f6a4d" font-family="Inter, system-ui, sans-serif" font-size="19">Secret Service</text>
    <text x="902" y="393" fill="#4f6a4d" font-family="Inter, system-ui, sans-serif" font-size="19">hidraw, std.crypto</text>
  </g>

  <path d="M350 325H455" stroke="#e6edf3" stroke-width="10" stroke-linecap="round"/>
  <path d="M440 300L475 325L440 350" fill="none" stroke="#e6edf3" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M745 325H850" stroke="#e6edf3" stroke-width="10" stroke-linecap="round"/>
  <path d="M835 300L870 325L835 350" fill="none" stroke="#e6edf3" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <g font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="720">
    <rect x="169" y="492" width="154" height="46" rx="23" fill="#243245" stroke="#8bb8ff"/>
    <text x="207" y="521" fill="#e8f1ff">crypto</text>
    <rect x="350" y="492" width="154" height="46" rx="23" fill="#243245" stroke="#8bb8ff"/>
    <text x="390" y="521" fill="#e8f1ff">ctap2</text>
    <rect x="531" y="492" width="154" height="46" rx="23" fill="#243245" stroke="#8bb8ff"/>
    <text x="565" y="521" fill="#e8f1ff">keychain</text>
    <rect x="712" y="492" width="154" height="46" rx="23" fill="#243245" stroke="#8bb8ff"/>
    <text x="751" y="521" fill="#e8f1ff">notify</text>
  </g>

  <text x="80" y="584" fill="#b8c6c8" font-family="Fira Code, ui-monospace, monospace" font-size="18">Swift/ObjC app code -- C ABI -- Zig native capability layer -- Linux distro packaging</text>
</svg>
