name: Publish shadow preview

# Builds the latest active same-repo PR branch into the public CI source image
# package, then dispatches the private infra repo to mirror/apply that exact
# tag to the tailnet-only shadow blog route.
#
# Security shape:
# - fork PRs are ignored
# - draft PRs are ignored
# - the public blog workflow never receives cluster or RustFS credentials
# - a short-lived GitHub App token dispatches only the private infra workflow
# - the private infra repo owns GHCR private mirroring and OpenTofu apply

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      source_runner:
        description: "Runner for the public source image build"
        required: false
        default: "tinyland-dind"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SOURCE_IMAGE: ghcr.io/jesssullivan/jesssullivan-github-io-shadow-tailnet
  DEPLOY_REPOSITORY: Jesssullivan/jesssullivan-infra
  SOURCE_RUNNER: ${{ inputs.source_runner || vars.BLOG_SHADOW_SOURCE_RUNNER || 'tinyland-dind' }}

jobs:
  resolve:
    name: Resolve preview target
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      deploy: ${{ steps.target.outputs.deploy }}
      ref: ${{ steps.target.outputs.ref }}
      branch: ${{ steps.target.outputs.branch }}
      sha: ${{ steps.target.outputs.sha }}
      pr_number: ${{ steps.target.outputs.pr_number }}
      image_tag: ${{ steps.target.outputs.image_tag }}
      source_runner: ${{ steps.target.outputs.source_runner }}
    steps:
      - name: Resolve active branch or PR
        id: target
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventName = context.eventName;

            let deploy = false;
            let ref = "";
            let branch = "";
            let sha = "";
            let prNumber = "";
            const sourceRunner = process.env.SOURCE_RUNNER || "tinyland-dind";
            const allowedSourceRunners = new Set(["tinyland-dind", "ubuntu-latest"]);

            if (!allowedSourceRunners.has(sourceRunner)) {
              throw new Error(`Unsupported source runner ${sourceRunner}. Allowed: tinyland-dind, ubuntu-latest.`);
            }

            if (eventName === "pull_request") {
              const pr = context.payload.pull_request;
              if (pr.draft) {
                core.notice(`Skipping draft PR #${pr.number}.`);
              } else if (pr.head.repo.full_name !== `${owner}/${repo}`) {
                core.notice(`Skipping fork PR #${pr.number}; shadow deploy is same-repo only.`);
              } else {
                deploy = true;
                branch = pr.head.ref;
                ref = pr.head.sha;
                sha = pr.head.sha;
                prNumber = String(pr.number);
              }
            } else if (eventName === "workflow_dispatch") {
              deploy = true;
              ref = context.sha;
              sha = context.sha;
              branch = context.ref.replace(/^refs\/(heads|tags)\//, "");
            } else {
              core.notice(`Skipping unsupported event ${eventName}.`);
            }

            let imageTag = "";
            if (deploy) {
              const raw = prNumber ? `pr-${prNumber}-${branch}` : branch;
              const slug = raw.replace(/\//g, "-").replace(/[^A-Za-z0-9-]/g, "") || "manual";
              imageTag = `shadow-${slug}-${sha.slice(0, 12)}-amd64`;
              core.notice(`Shadow preview target: ${imageTag}`);
            }

            core.setOutput("deploy", deploy ? "true" : "false");
            core.setOutput("ref", ref);
            core.setOutput("branch", branch);
            core.setOutput("sha", sha);
            core.setOutput("pr_number", prNumber);
            core.setOutput("image_tag", imageTag);
            core.setOutput("source_runner", sourceRunner);

  build:
    name: Build source image
    needs: resolve
    if: needs.resolve.outputs.deploy == 'true'
    runs-on: ${{ needs.resolve.outputs.source_runner }}
    permissions:
      contents: read
      packages: write
    outputs:
      source_digest: ${{ steps.source_image.outputs.digest }}
    concurrency:
      group: blog-shadow-preview-build
      cancel-in-progress: true
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR for source image
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push source image
        id: source_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.shadow
          push: true
          platforms: linux/amd64
          tags: ${{ env.SOURCE_IMAGE }}:${{ needs.resolve.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Require immutable source digest
        env:
          SOURCE_DIGEST: ${{ steps.source_image.outputs.digest }}
        run: |
          set -euo pipefail
          if [[ ! "${SOURCE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Build did not return a valid OCI digest."
            exit 1
          fi

      - name: Trivy scan (report-only for shadow preview)
        # v0.36.0; keep this action pinned because the shadow lane has deploy credentials nearby.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        continue-on-error: true
        with:
          image-ref: ${{ env.SOURCE_IMAGE }}:${{ needs.resolve.outputs.image_tag }}
          version: v0.70.0
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Source image summary
        run: |
          {
            echo "## Shadow preview source image"
            echo ""
            echo "- Source image: \`${SOURCE_IMAGE}:${{ needs.resolve.outputs.image_tag }}\`"
            echo "- Source digest: \`${{ steps.source_image.outputs.digest }}\`"
            echo "- Commit: \`${{ needs.resolve.outputs.sha }}\`"
            echo "- Source runner: \`${{ needs.resolve.outputs.source_runner }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  dispatch:
    name: Dispatch and verify private shadow
    needs:
      - resolve
      - build
    if: needs.resolve.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: blog-shadow-dispatch
    permissions: {}
    concurrency:
      group: blog-shadow-preview-dispatch
      cancel-in-progress: true
    timeout-minutes: 50
    steps:

      - name: Mint private overlay dispatch token
        id: overlay_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.BLOG_SHADOW_DISPATCH_APP_ID }}
          private-key: ${{ secrets.BLOG_SHADOW_DISPATCH_APP_PRIVATE_KEY }}
          owner: Jesssullivan
          repositories: jesssullivan-infra
          permission-actions: write

      - name: Dispatch private infra deploy
        id: dispatch
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
          SOURCE_BRANCH: ${{ needs.resolve.outputs.branch }}
          SOURCE_SHA: ${{ needs.resolve.outputs.sha }}
          SOURCE_DIGEST: ${{ needs.build.outputs.source_digest }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
        with:
          github-token: ${{ steps.overlay_token.outputs.token }}
          script: |
            const [owner, repo] = process.env.DEPLOY_REPOSITORY.split("/");
            const expectedRunName = `Blog shadow ${process.env.SOURCE_SHA} (source run ${context.runId})`;
            const dispatchedAt = new Date(Date.now() - 5_000).toISOString();
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: "blog-shadow-preview-deploy.yml",
              ref: "main",
              inputs: {
                source_repository: context.repo.owner + "/" + context.repo.repo,
                source_image: process.env.SOURCE_IMAGE,
                image_tag: process.env.IMAGE_TAG,
                source_branch: process.env.SOURCE_BRANCH,
                source_sha: process.env.SOURCE_SHA,
                source_digest: process.env.SOURCE_DIGEST,
                pr_number: process.env.PR_NUMBER,
                source_workflow_run_id: String(context.runId),
              },
            });
            core.setOutput("expected_run_name", expectedRunName);
            core.setOutput("dispatched_at", dispatchedAt);

      - name: Await exact private infra deploy
        id: await_deploy
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          EXPECTED_RUN_NAME: ${{ steps.dispatch.outputs.expected_run_name }}
          DISPATCHED_AT: ${{ steps.dispatch.outputs.dispatched_at }}
        with:
          github-token: ${{ steps.overlay_token.outputs.token }}
          script: |
            const [owner, repo] = process.env.DEPLOY_REPOSITORY.split("/");
            const workflowId = "blog-shadow-preview-deploy.yml";
            const expectedRunName = process.env.EXPECTED_RUN_NAME;
            const dispatchedAt = Date.parse(process.env.DISPATCHED_AT);
            const discoveryDeadline = Date.now() + 5 * 60 * 1_000;
            const completionDeadline = Date.now() + 40 * 60 * 1_000;
            const delay = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds));

            let run;
            while (Date.now() < discoveryDeadline) {
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                event: "workflow_dispatch",
                per_page: 50,
              });
              run = response.data.workflow_runs.find((candidate) =>
                candidate.display_title === expectedRunName &&
                Date.parse(candidate.created_at) >= dispatchedAt
              );
              if (run) break;
              await delay(10_000);
            }

            if (!run) {
              throw new Error(`Private receiver run ${expectedRunName} did not appear within five minutes.`);
            }

            core.notice(`Awaiting private receiver run ${run.html_url}`);
            while (Date.now() < completionDeadline) {
              const response = await github.rest.actions.getWorkflowRun({
                owner,
                repo,
                run_id: run.id,
              });
              run = response.data;
              if (run.status === "completed") {
                core.setOutput("receiver_run_url", run.html_url);
                if (run.conclusion !== "success") {
                  throw new Error(`Private receiver run concluded ${run.conclusion}: ${run.html_url}`);
                }
                return;
              }
              await delay(15_000);
            }

            throw new Error(`Private receiver run did not complete within forty minutes: ${run.html_url}`);

      - name: Summary
        env:
          SUMMARY_BRANCH: ${{ needs.resolve.outputs.branch }}
          SUMMARY_IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
          SUMMARY_PR_NUMBER: ${{ needs.resolve.outputs.pr_number || 'manual' }}
          SUMMARY_RECEIVER_URL: ${{ steps.await_deploy.outputs.receiver_run_url }}
          SUMMARY_SOURCE_DIGEST: ${{ needs.build.outputs.source_digest }}
          SUMMARY_SOURCE_RUNNER: ${{ needs.resolve.outputs.source_runner }}
          SUMMARY_SOURCE_SHA: ${{ needs.resolve.outputs.sha }}
        run: |
          {
            echo "## Shadow preview dispatch"
            echo ""
            echo "- Source image: \`${SOURCE_IMAGE}:${SUMMARY_IMAGE_TAG}\`"
            echo "- Branch: \`${SUMMARY_BRANCH}\`"
            echo "- Commit: \`${SUMMARY_SOURCE_SHA}\`"
            echo "- Source digest: \`${SUMMARY_SOURCE_DIGEST}\`"
            echo "- PR: \`${SUMMARY_PR_NUMBER}\`"
            echo "- Source runner: \`${SUMMARY_SOURCE_RUNNER}\`"
            echo "- Deploy repo: \`${DEPLOY_REPOSITORY}\`"
            echo "- Private receiver: ${SUMMARY_RECEIVER_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
