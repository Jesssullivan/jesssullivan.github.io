name: Collect External Blog Posts

on:
  repository_dispatch:
    types: [blog-content-changed]
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 09:00 UTC
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated repo list (owner/name). Leave empty to use blog-sources.json.'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Collect posts from source repos
        env:
          GH_TOKEN: ${{ secrets.BLOG_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
          DISPATCH_REPO: ${{ github.event.client_payload.source_repo || '' }}
          MANUAL_REPOS: ${{ github.event.inputs.repos || '' }}
        run: node scripts/collect-external-posts.mjs

      - name: Summarize collected posts
        id: summary
        run: |
          # List new/changed post files vs the base branch
          posts=$(git diff --name-only HEAD -- src/posts/ | grep '\.md$' || true)
          if [ -z "$posts" ]; then
            echo "post_list=_No new posts collected in this run._" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          else
            count=$(echo "$posts" | wc -l | tr -d ' ')
            echo "count=$count" >> "$GITHUB_OUTPUT"
            # Build a markdown list
            list=""
            for f in $posts; do
              name=$(basename "$f" .md)
              list="${list}- \`${name}\`\n"
            done
            # Use a delimiter for multiline output
            {
              echo "post_list<<ENDOFLIST"
              echo -e "$list"
              echo "ENDOFLIST"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create Draft PR with collected posts
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'feat(content): collect external blog posts'
          branch: auto/collect-posts
          delete-branch: true
          title: 'Content: new blog posts from external repos'
          draft: true
          labels: content,auto-collected,blog-content,draft-post
          body: |
            ## Collected Blog Posts

            Automated collection of blog posts from configured source repos.

            **${{ steps.summary.outputs.count }}** post(s) collected:

            ${{ steps.summary.outputs.post_list }}

            ---

            ### Review workflow

            Posts are imported with `published: false`. To publish:
            1. Review and edit each post
            2. Set `published: true` in the frontmatter
            3. Merge this PR

            ### Scheduling

            To schedule this PR for future publication, add the following to this PR description:
            ```
            DO NOT MERGE until YYYY-MM-DD UTC
            ```
            The [auto-merge workflow](.github/workflows/auto-merge-scheduled.yml) runs daily at 05:00 UTC and will merge this PR once the date has passed and all CI checks are green.

            ---
            Source: `scripts/collect-external-posts.mjs`
