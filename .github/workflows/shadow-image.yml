name: Build shadow image

# Builds and pushes the tailnet-only mirror image used by jesssullivan-infra's
# jesssullivan-blog-shadow tofu stack. Triggered ONLY on shadow-deploy/*
# branches; this workflow does not run on main, on PRs against main, or on
# any other branch pattern.
#
# Active PR branches use shadow-preview.yml instead. That workflow builds the
# same Dockerfile, dispatches jesssullivan-infra, and lets the private repo
# mirror/apply the image tag to the shared tailnet shadow route.
#
# This workflow builds the source artifact on the tinyland-dind ARC lane. The
# workflow-published package is not the deploy pull target: GitHub links
# GITHUB_TOKEN publishes from this public repo back to the public repo, and the
# resulting GHCR package is public. Operators mirror the exact pushed digest to
# the unlinked private package with a non-GITHUB_TOKEN credential before apply.
#
# Bootstrap: the very first build can run on `runs-on: ubuntu-latest` before
# the ARC enrollment for this repo (TIN-705/706 in jesssullivan-infra) lands.
# After enrollment, swap the runs-on label to `tinyland-dind`.
# Operator fallback: set BLOG_SHADOW_SOURCE_RUNNER=ubuntu-latest, or pass
# source_runner on manual dispatch, when the ARC lane is unavailable.

on:
  push:
    branches:
      - 'shadow-deploy/**'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (defaults to current ref)'
        required: false
      source_runner:
        description: 'Runner for the public source image build'
        required: false
        default: 'tinyland-dind'

concurrency:
  group: shadow-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  IMAGE_NAME: ghcr.io/jesssullivan/jesssullivan-github-io-shadow-tailnet
  SOURCE_RUNNER: ${{ inputs.source_runner || vars.BLOG_SHADOW_SOURCE_RUNNER || 'tinyland-dind' }}

jobs:
  resolve:
    name: Resolve shadow image runner
    runs-on: ubuntu-latest
    outputs:
      source_runner: ${{ steps.runner.outputs.source_runner }}
    steps:
      - name: Resolve source runner
        id: runner
        run: |
          set -euo pipefail
          case "${SOURCE_RUNNER}" in
            tinyland-dind|ubuntu-latest)
              ;;
            *)
              echo "::error::Unsupported source runner ${SOURCE_RUNNER}. Allowed: tinyland-dind, ubuntu-latest."
              exit 1
              ;;
          esac
          echo "source_runner=${SOURCE_RUNNER}" >> "$GITHUB_OUTPUT"

  build:
    name: Build and push shadow image
    needs: resolve
    runs-on: ${{ needs.resolve.outputs.source_runner }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve selected source identity
        id: source
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          if [[ ! "${source_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Selected source did not resolve to a full commit SHA."
            exit 1
          fi
          {
            echo "sha=${source_sha}"
            echo "short_sha=${source_sha:0:12}"
            echo "workflow_run_id=${GITHUB_RUN_ID}"
          } >> "$GITHUB_OUTPUT"

      - name: Compute image tag
        id: tag
        run: |
          set -euo pipefail
          REF_RAW="${{ inputs.ref || github.ref_name }}"
          REF_SLUG="$(echo "${REF_RAW}" | tr '/' '-' | tr -cd '[:alnum:]-')"
          if [ -z "${REF_SLUG}" ]; then
            REF_SLUG="manual"
          fi
          SHA_SHORT="${{ steps.source.outputs.short_sha }}"
          TAG="shadow-${REF_SLUG}-${SHA_SHORT}-amd64"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: source_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.shadow
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Validate immutable source evidence
        id: evidence
        env:
          SOURCE_DIGEST: ${{ steps.source_image.outputs.digest }}
        run: |
          set -euo pipefail
          if [[ ! "${SOURCE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Source image did not publish a valid immutable OCI digest."
            exit 1
          fi
          echo "source_digest=${SOURCE_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Trivy scan (report-only for M1.5)
        # v0.36.0; keep this action pinned because the shadow lane has deploy credentials nearby.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          version: v0.70.0
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Summary
        env:
          SUMMARY_IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          SUMMARY_SOURCE_DIGEST: ${{ steps.evidence.outputs.source_digest }}
          SUMMARY_SOURCE_SHA: ${{ steps.source.outputs.sha }}
          SUMMARY_SOURCE_RUN_ID: ${{ steps.source.outputs.workflow_run_id }}
        run: |
          {
            echo "## Shadow image build"
            echo ""
            echo "- Image tag: \`${IMAGE_NAME}:${SUMMARY_IMAGE_TAG}\`"
            echo "- Source digest: \`${SUMMARY_SOURCE_DIGEST}\`"
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Selected commit: \`${SUMMARY_SOURCE_SHA}\`"
            echo "- Source workflow run: \`${SUMMARY_SOURCE_RUN_ID}\`"
            echo "- Source runner: \`${{ needs.resolve.outputs.source_runner }}\`"
            echo ""
            echo "### Private package mirror"
            echo ""
            echo "Mirror the exact CI-built artifact to the private operator package before deploy:"
            echo ""
            echo "\`\`\`bash"
            echo "gh auth token | docker login ghcr.io -u Jesssullivan --password-stdin"
            echo "docker buildx imagetools create \\"
            echo "  -t ghcr.io/jesssullivan/jesssullivan-github-io-shadow-operator:${SUMMARY_IMAGE_TAG} \\"
            echo "  ${IMAGE_NAME}@${SUMMARY_SOURCE_DIGEST}"
            echo "operator_digest=\"\$(docker buildx imagetools inspect \\"
            echo "  ghcr.io/jesssullivan/jesssullivan-github-io-shadow-operator:${SUMMARY_IMAGE_TAG} \\"
            echo "  --format '{{json .Manifest.Digest}}' | tr -d '\"')\""
            echo "docker logout ghcr.io"
            echo "\`\`\`"
            echo ""
            echo "### Operator next steps"
            echo "From \`~/git/jesssullivan-infra/\`:"
            echo ""
            echo "\`\`\`bash"
            echo "export TF_VAR_image_tag=${SUMMARY_IMAGE_TAG}"
            echo "export TF_VAR_image_digest=\"\${operator_digest}\""
            echo "export TF_VAR_source_sha=${SUMMARY_SOURCE_SHA}"
            echo "export TF_VAR_source_workflow_run_id=${SUMMARY_SOURCE_RUN_ID}"
            echo "export TF_VAR_ghcr_token=\"\$(operator-token-source)\""
            echo "export TF_VAR_ghcr_username=\"jesssullivan\""
            echo "just blog-shadow-plan"
            echo "just blog-shadow-plan-show"
            echo "just blog-shadow-apply"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
