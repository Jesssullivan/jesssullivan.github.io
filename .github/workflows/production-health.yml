name: Production Health

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      send_ntfy_smoke:
        description: 'Send a harmless ntfy smoke notification before health checks'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  deployments: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  production-health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Send ntfy smoke notification
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_ntfy_smoke }}
        env:
          NTFY_TOPIC_URL: ${{ secrets.NTFY_TOPIC_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NTFY_TOPIC_URL:-}" ]; then
            echo "::error title=ntfy smoke failed::NTFY_TOPIC_URL is not configured."
            exit 1
          fi

          body="$(mktemp)"
          {
            echo "production-health ntfy smoke test for transscendsurvival.org"
            echo ""
            echo "This is a harmless manual alert-routing test. DNS, Pages, and site serving were not mutated."
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "Ref: ${GITHUB_REF_NAME}"
            echo "SHA: ${GITHUB_SHA}"
          } >"${body}"

          auth_args=()
          if [ -n "${NTFY_TOKEN:-}" ]; then
            auth_args=(-H "Authorization: Bearer ${NTFY_TOKEN}")
          fi

          curl -fsS \
            -H "Title: production-health ntfy SMOKE - transscendsurvival.org" \
            -H "Priority: 3" \
            -H "Tags: test_tube,dns" \
            "${auth_args[@]}" \
            --data-binary "@${body}" \
            "${NTFY_TOPIC_URL}"
      - name: Ensure Chromium for hydration check
        run: |
          if ! command -v chromium >/dev/null 2>&1 && \
             ! command -v chromium-browser >/dev/null 2>&1 && \
             ! command -v google-chrome >/dev/null 2>&1 && \
             ! command -v google-chrome-stable >/dev/null 2>&1; then
            npx playwright install --with-deps chromium
          fi
      - name: Ensure dig for the TCP/53 DNS health check
        run: |
          if ! command -v dig >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq bind9-dnsutils
          fi
      - name: Run production health checks
        id: production_health
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:production-health 2>&1 | tee production-health-output.txt

      - name: Notify ntfy on production health failure
        if: steps.production_health.outcome == 'failure'
        env:
          NTFY_TOPIC_URL: ${{ secrets.NTFY_TOPIC_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NTFY_TOPIC_URL:-}" ]; then
            echo "::notice title=ntfy alert skipped::NTFY_TOPIC_URL is not configured."
            exit 0
          fi

          body="$(mktemp)"
          {
            echo "production-health FAILED for transscendsurvival.org"
            echo ""
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "Ref: ${GITHUB_REF_NAME}"
            echo "SHA: ${GITHUB_SHA}"
            echo ""
            echo "Last 120 log lines:"
            tail -n 120 production-health-output.txt
          } >"${body}"

          auth_args=()
          if [ -n "${NTFY_TOKEN:-}" ]; then
            auth_args=(-H "Authorization: Bearer ${NTFY_TOKEN}")
          fi

          curl -fsS \
            -H "Title: production-health FAILED - transscendsurvival.org" \
            -H "Priority: 5" \
            -H "Tags: rotating_light,dns" \
            "${auth_args[@]}" \
            --data-binary "@${body}" \
            "${NTFY_TOPIC_URL}"

      - name: Fail after production health notification
        if: steps.production_health.outcome == 'failure'
        run: exit 1

      - name: Verify Pages deployment is current main
        id: pages_deployment
        continue-on-error: true
        run: |
          set -euo pipefail
          latest_main="$(gh api repos/${GITHUB_REPOSITORY}/commits/main --jq .sha)"
          latest_pages="$(gh api "repos/${GITHUB_REPOSITORY}/deployments?environment=github-pages&per_page=1" --jq '.[0].sha')"
          if [ "${latest_pages}" != "${latest_main}" ]; then
            gh workflow run deploy-pages.yml --ref main
            echo "::error title=GitHub Pages is stale::github-pages deployment ${latest_pages} does not match main ${latest_main}"
            echo "::notice title=Pages deploy dispatched::Triggered deploy-pages.yml for main ${latest_main}"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Notify ntfy on stale Pages deployment
        if: steps.pages_deployment.outcome == 'failure'
        env:
          NTFY_TOPIC_URL: ${{ secrets.NTFY_TOPIC_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NTFY_TOPIC_URL:-}" ]; then
            echo "::notice title=ntfy alert skipped::NTFY_TOPIC_URL is not configured."
            exit 0
          fi

          body="$(mktemp)"
          {
            echo "production-health detected a stale GitHub Pages deployment."
            echo ""
            echo "The workflow dispatched deploy-pages.yml, but this monitor is failing until Pages catches up."
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "Ref: ${GITHUB_REF_NAME}"
            echo "SHA: ${GITHUB_SHA}"
          } >"${body}"

          auth_args=()
          if [ -n "${NTFY_TOKEN:-}" ]; then
            auth_args=(-H "Authorization: Bearer ${NTFY_TOKEN}")
          fi

          curl -fsS \
            -H "Title: production-health STALE PAGES - transscendsurvival.org" \
            -H "Priority: 4" \
            -H "Tags: warning,dns" \
            "${auth_args[@]}" \
            --data-binary "@${body}" \
            "${NTFY_TOPIC_URL}"

      - name: Fail after stale Pages notification
        if: steps.pages_deployment.outcome == 'failure'
        run: exit 1
