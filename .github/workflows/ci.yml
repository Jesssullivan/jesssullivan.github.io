name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect secrets with gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'false'

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Static production dependency audit
        run: npm run security:audit:static

      - name: Restore SvelteKit build cache
        uses: actions/cache@v5
        with:
          path: .svelte-kit
          key: sveltekit-${{ runner.os }}-${{ hashFiles('svelte.config.js', 'vite.config.ts', 'src/**') }}
          restore-keys: |
            sveltekit-${{ runner.os }}-

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npx vitest run --coverage
        continue-on-error: false

      - name: Blog agent typecheck
        run: npm --workspace packages/blog-agent run typecheck

      - name: Blog agent tests
        run: npm --workspace packages/blog-agent run test

      - name: Blog agent production dependency audit (report-only)
        run: npm run security:audit:blog-agent
        continue-on-error: true

      - name: Pulse-core tests + typecheck + proto guard
        run: npm run test:pulse-core

      - name: Pulse-client tests + typecheck
        run: npm run test:pulse-client

      - name: Build
        run: npm run build

      - name: Validate redirects
        run: npx tsx scripts/validate-redirects.mts

      - name: Validate frontmatter
        run: npx tsx scripts/validate-frontmatter.mts

      - name: Audit links
        run: npx tsx scripts/audit-links.mts

      - name: Install Playwright browsers for PR smoke
        if: github.event_name == 'pull_request'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright browsers for full regression
        if: github.event_name != 'pull_request'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: E2E PR smoke
        if: github.event_name == 'pull_request'
        run: >
          npx playwright test
          --project=chromium
          --project=webkit
          e2e/homepage.spec.ts
          e2e/navigation.spec.ts
          e2e/dark-mode.spec.ts
          e2e/about-merged.spec.ts
          e2e/card-enhancement.spec.ts
          e2e/pulse-lab.spec.ts
          e2e/pulse-client.spec.ts
          e2e/pulse-brokered-stream.spec.ts
        continue-on-error: false

      - name: E2E full regression
        if: github.event_name != 'pull_request'
        run: npx playwright test
        continue-on-error: false

      - name: Bundle size report
        run: npx tsx scripts/report-bundle-size.mts

      - name: Lighthouse CI
        id: lhci
        run: |
          npm install -g @lhci/cli
          lhci autorun
        continue-on-error: true

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: .lighthouseci/
          include-hidden-files: true
          retention-days: 14

      - name: CI Summary
        if: always()
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          node -e "
            const fs = require('fs');
            const path = require('path');
            const lines = [];

            // Bundle sizes
            const buildDir = path.join('build', '_app', 'immutable');
            let totalJS = 0, totalCSS = 0, jsCount = 0, cssCount = 0;
            function walk(dir) {
              try {
                for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
                  const full = path.join(dir, e.name);
                  if (e.isDirectory()) { walk(full); continue; }
                  const size = fs.statSync(full).size;
                  if (e.name.endsWith('.js') || e.name.endsWith('.mjs')) { totalJS += size; jsCount++; }
                  else if (e.name.endsWith('.css')) { totalCSS += size; cssCount++; }
                }
              } catch {}
            }
            walk(buildDir);
            const fmt = (b) => b < 1024 ? b + ' B' : (b/1024).toFixed(1) + ' KB';
            lines.push('### Bundle Size');
            lines.push('| Type | Size | Files |');
            lines.push('|------|------|-------|');
            lines.push('| JS | ' + fmt(totalJS) + ' | ' + jsCount + ' |');
            lines.push('| CSS | ' + fmt(totalCSS) + ' | ' + cssCount + ' |');
            lines.push('| **Total** | **' + fmt(totalJS + totalCSS) + '** | ' + (jsCount + cssCount) + ' |');
            lines.push('');

            // Lighthouse scores
            try {
              const lhDir = '.lighthouseci';
              const jsonFiles = fs.readdirSync(lhDir).filter(f => f.endsWith('.json') && f.startsWith('lhr-'));
              if (jsonFiles.length > 0) {
                lines.push('### Lighthouse Scores');
                lines.push('| Page | Perf | A11y | Best Practices | SEO |');
                lines.push('|------|------|------|----------------|-----|');
                for (const f of jsonFiles) {
                  const lhr = JSON.parse(fs.readFileSync(path.join(lhDir, f), 'utf-8'));
                  const url = new URL(lhr.requestedUrl || lhr.finalUrl).pathname;
                  const s = (cat) => Math.round((lhr.categories[cat]?.score || 0) * 100);
                  lines.push('| ' + url + ' | ' + s('performance') + ' | ' + s('accessibility') + ' | ' + s('best-practices') + ' | ' + s('seo') + ' |');
                }
                lines.push('');
              }
            } catch {}

            console.log(lines.join('\n'));
          " >> $GITHUB_STEP_SUMMARY

      - name: Upload vitest results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-report
          path: |
            coverage/
            test-results/vitest/
          retention-days: 7

      - name: Upload Playwright results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
