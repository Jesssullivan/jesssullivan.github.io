name: Blog Post Review Bot

on:
  pull_request:
    types: [opened, synchronize]
    paths: ['src/posts/**']
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── Review: run the Effect-based blog-agent ────────────────
  review-posts:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run blog-agent review
        run: npx tsx packages/blog-agent/src/cli.ts review --pr ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Slash commands: /schedule, /publish, /draft, /retitle ──
  slash-commands:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Handle slash command
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.issue.number;
            const commentBody = context.payload.comment.body.trim();
            const commentAuthor = context.payload.comment.user.login;

            // Only allow repo collaborators
            try {
              await github.rest.repos.checkCollaborator({ owner, repo, username: commentAuthor });
            } catch {
              core.info(`${commentAuthor} is not a collaborator — ignoring`);
              return;
            }

            // React to acknowledge
            await github.rest.reactions.createForIssueComment({
              owner, repo, comment_id: context.payload.comment.id, content: '+1'
            });

            const parts = commentBody.split(/\s+/);
            const cmd = parts[0].toLowerCase();
            const args = parts.slice(1).join(' ');

            // Dispatch to blog-agent CLI for /review and /suggest-links
            if (cmd === '/review') {
              const { execSync } = require('child_process');
              try {
                execSync(
                  `npx tsx packages/blog-agent/src/cli.ts review --pr ${prNumber}`,
                  { env: { ...process.env, GITHUB_TOKEN: process.env.GITHUB_TOKEN }, stdio: 'inherit' }
                );
              } catch (e) {
                core.warning(`Review failed: ${e.message}`);
              }
              return;
            }

            // Simple commands handled inline (they just modify PR content)
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            if (cmd === '/schedule') {
              const dateMatch = args.match(/(\d{4}-\d{2}-\d{2})/);
              if (!dateMatch) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber,
                  body: '⚠️ Usage: `/schedule YYYY-MM-DD`'
                });
                return;
              }
              const scheduleDate = dateMatch[1];
              let body = pr.body || '';
              const existing = body.match(/DO NOT MERGE until \d{4}-\d{2}-\d{2}\s*UTC/i);
              if (existing) {
                body = body.replace(existing[0], `DO NOT MERGE until ${scheduleDate} UTC`);
              } else {
                body += `\n\nDO NOT MERGE until ${scheduleDate} UTC`;
              }
              await github.rest.pulls.update({ owner, repo, pull_number: prNumber, body });
              try {
                await github.rest.issues.getLabel({ owner, repo, name: 'scheduled' });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, name: 'scheduled', color: 'a2eeef' });
              }
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['scheduled'] });
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `📅 Scheduled for **${scheduleDate} UTC**. Auto-merge runs daily at 05:00 UTC.`
              });
              return;
            }

            if (cmd === '/publish' || cmd === '/draft') {
              const setPublished = cmd === '/publish';
              const { data: files } = await github.rest.pulls.listFiles({
                owner, repo, pull_number: prNumber, per_page: 100
              });
              const postFiles = files.filter(
                f => f.filename.startsWith('src/posts/') && f.filename.endsWith('.md') && f.status !== 'removed'
              );
              const target = args.trim();
              const targets = target ? postFiles.filter(f => f.filename.includes(target)) : postFiles;

              const updated = [];
              for (const file of targets) {
                const { data } = await github.rest.repos.getContent({
                  owner, repo, path: file.filename, ref: pr.head.sha
                });
                let content = Buffer.from(data.content, 'base64').toString('utf-8');
                const pubRegex = /^published:\s*(true|false)\s*$/m;
                if (pubRegex.test(content)) {
                  content = content.replace(pubRegex, `published: ${setPublished}`);
                } else {
                  content = content.replace(/^---\r?\n/, `---\npublished: ${setPublished}\n`);
                }
                await github.rest.repos.createOrUpdateFileContents({
                  owner, repo, path: file.filename,
                  message: `chore(blog): set ${file.filename.split('/').pop()} to ${cmd === '/publish' ? 'published' : 'draft'}`,
                  content: Buffer.from(content).toString('base64'),
                  sha: data.sha, branch: pr.head.ref
                });
                updated.push(file.filename.split('/').pop());
              }
              const icon = setPublished ? '✅' : '📝';
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `${icon} Set **${updated.join(', ')}** to \`published: ${setPublished}\`.`
              });
              return;
            }

            if (cmd === '/retitle') {
              const titleMatch = args.match(/^["'](.+?)["']\s*(.*)/);
              if (!titleMatch) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber,
                  body: '⚠️ Usage: `/retitle "New Title"` or `/retitle "New Title" filename.md`'
                });
                return;
              }
              const newTitle = titleMatch[1];
              const fileHint = titleMatch[2].trim();
              const { data: files } = await github.rest.pulls.listFiles({
                owner, repo, pull_number: prNumber, per_page: 100
              });
              const postFiles = files.filter(
                f => f.filename.startsWith('src/posts/') && f.filename.endsWith('.md') && f.status !== 'removed'
              );
              const targets = fileHint ? postFiles.filter(f => f.filename.includes(fileHint)) : postFiles.slice(0, 1);
              for (const file of targets) {
                const { data } = await github.rest.repos.getContent({
                  owner, repo, path: file.filename, ref: pr.head.sha
                });
                let content = Buffer.from(data.content, 'base64').toString('utf-8');
                content = content.replace(/^title:\s*["']?.*["']?\s*$/m, `title: "${newTitle}"`);
                await github.rest.repos.createOrUpdateFileContents({
                  owner, repo, path: file.filename,
                  message: `chore(blog): retitle ${file.filename.split('/').pop()}`,
                  content: Buffer.from(content).toString('base64'),
                  sha: data.sha, branch: pr.head.ref
                });
              }
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `✏️ Retitled to **"${newTitle}"**.`
              });
              return;
            }
