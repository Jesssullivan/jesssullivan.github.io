name: Blog Post Review Bot

on:
  pull_request:
    types: [opened, synchronize]
    paths: ['src/posts/**']
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── Review: run the Effect-based blog-agent ────────────────
  review-posts:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run blog-agent review
        run: npx tsx packages/blog-agent/src/cli.ts review --pr ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Slash commands: /schedule, /publish, /draft, /retitle ──
  slash-commands:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Handle slash command
        run: |
          npx tsx packages/blog-agent/src/cli.ts command \
            --pr "$PR_NUMBER" \
            --body "$COMMENT_BODY" \
            --commenter "$COMMENTER" \
            --comment-id "$COMMENT_ID"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENTER: ${{ github.event.comment.user.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
