name: Cloudflare Pages Shadow Deploy

on:
  workflow_dispatch:
    inputs:
      require_deploy:
        description: "Fail instead of skipping when Cloudflare credentials are missing"
        required: false
        type: boolean
        default: false
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/cloudflare-pages-shadow.yml"
      - "package.json"
      - "package-lock.json"
      - "svelte.config.js"
      - "vite.config.ts"
      - "scripts/**"
      - "src/**"
      - "static/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/cloudflare-pages-shadow.yml"
      - "package.json"
      - "package-lock.json"
      - "svelte.config.js"
      - "vite.config.ts"
      - "scripts/**"
      - "src/**"
      - "static/**"

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-shadow-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'transscendsurvival-org' }}

jobs:
  shadow-deploy:
    name: Build and optionally deploy Cloudflare Pages shadow
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx tsx scripts/validate-redirects.mts

      - name: Resolve Cloudflare deploy eligibility
        id: cloudflare
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          REQUIRE_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && inputs.require_deploy || 'false' }}
        run: |
          deploy_branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          can_deploy=true
          missing=()

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            can_deploy=false
            echo "::notice title=Cloudflare shadow deploy skipped::Pull requests build only; deploy after merge or manual dispatch."
          fi

          if [ -z "${CF_ACCOUNT_ID}" ]; then
            can_deploy=false
            missing+=("CLOUDFLARE_ACCOUNT_ID")
          fi

          if [ -z "${CF_API_TOKEN}" ]; then
            can_deploy=false
            missing+=("CLOUDFLARE_API_TOKEN")
          fi

          if [ "${can_deploy}" != "true" ] && [ "${#missing[@]}" -gt 0 ]; then
            message="Missing Cloudflare secrets: ${missing[*]}"
            if [ "${REQUIRE_DEPLOY}" = "true" ]; then
              echo "::error title=Cloudflare shadow deploy blocked::${message}"
              exit 1
            fi
            echo "::notice title=Cloudflare shadow deploy skipped::${message}"
          fi

          {
            echo "can_deploy=${can_deploy}"
            echo "branch=${deploy_branch}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Cloudflare Pages Shadow"
            echo ""
            echo "- Project: \`${CLOUDFLARE_PAGES_PROJECT_NAME}\`"
            echo "- Branch: \`${deploy_branch}\`"
            echo "- Deploy enabled: \`${can_deploy}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy shadow build to Cloudflare Pages
        if: steps.cloudflare.outputs.can_deploy == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=${{ steps.cloudflare.outputs.branch }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
