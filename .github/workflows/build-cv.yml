name: Sync CV PDFs

# Bazel-driven sync of the three resume / CV PDFs from spear_resumes into
# static/cv/. Triggered on changes to the Bazel surface or by manual
# dispatch (e.g. after bumping the spear_resumes pin).

on:
  push:
    branches: [main]
    paths:
      - MODULE.bazel
      - .bazelversion
      - .bazelrc
      - static/cv/BUILD.bazel
      - .github/workflows/build-cv.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # spear_resumes is a private repo; we fetch it with a read-only SSH
      # deploy key. Public half lives on the spear-resumes repo as a Deploy
      # Key; private half is this repo's SPEAR_RESUMES_DEPLOY_KEY secret.
      - name: Set up SSH for spear-resumes
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SPEAR_RESUMES_DEPLOY_KEY }}

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', '.bazelversion') }}
          restore-keys: bazel-${{ runner.os }}-

      - name: Install bazelisk
        run: |
          sudo curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o /usr/local/bin/bazel
          sudo chmod +x /usr/local/bin/bazel

      - name: Sync PDFs from spear_resumes
        run: bazel run //static/cv:sync_pdfs

      - name: Commit refreshed PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: rebuild CV PDFs from spear_resumes'
          file_pattern: 'static/cv/*.pdf'
