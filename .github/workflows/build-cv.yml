name: Build CV PDFs

on:
  push:
    branches: [main]
    paths: ['cv/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install tectonic
        uses: WtfJoke/setup-tectonic@8a63d072f8390efdff59da7fa08aa49e3c1f5e1b # v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Latin Modern fonts
        run: sudo apt-get install -y fonts-lmodern

      - name: Build CV PDFs
        run: |
          cd cv
          tectonic jess_sullivan_cv.tex || echo "CV build failed (may need header_image.png)"
          tectonic jess_sullivan_resume.tex || echo "Resume build failed"

      - name: Copy PDFs to static
        run: |
          cp cv/*.pdf static/cv/ 2>/dev/null || true

      - name: Commit updated PDFs
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: 'chore: rebuild CV PDFs'
          file_pattern: 'static/cv/*.pdf'
